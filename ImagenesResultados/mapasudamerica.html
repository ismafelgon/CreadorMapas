<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Creador de Mapas: América - Zombies</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap');

        body { 
            margin: 0; background: #111; color: white; 
            font-family: 'Poppins', sans-serif; display: flex; 
            height: 100vh; overflow: hidden;
        }

        #post-wrapper {
            flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #1a1a1a;
        }

        #post-container {
            width: 1080px; height: 1350px;
            position: relative; overflow: hidden; 
            background-color: #AED0E2; 
            flex-shrink: 0;
            transform: translateZ(0); 
        }

        /* TEXTOS */
        #info-fuente {
            position: absolute; top: 25px; right: 25px; z-index: 10;
            color: rgba(0,0,0,0.6); font-size: 25px; text-transform: uppercase; font-weight: 400;
        }

        #contenedor-titulos {
            position: absolute; top: 60px; left: 0; right: 0; z-index: 10; 
            display: flex; flex-direction: column; align-items: center; text-align: center;
            pointer-events: none; padding: 0 50px;
        }

        #mapa-titulo {
            color: #000; font-size: 45px; font-weight: 900; line-height: 1.1; 
            margin-top: 700px; margin-left: 560px; text-transform: uppercase; white-space: pre-line;
        }

        #mapa-bajada {
            color: #333; font-size: 26px; margin-left: 560px; font-weight: 400; line-height: 1.2; max-width: 800px;
        }

        /* CAPAS MAPA */
        .mapa { 
            position: absolute; inset: 0; width: 100%; height: 100%; 
            background-color: #AFAFAF; z-index: 1; 
            -webkit-mask-size: 100% 100% !important; mask-size: 100% 100% !important;
            -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
        }

        .img-mapa {
            position: absolute; z-index: 5; transform: translate(-50%, -50%);
            display: none; object-fit: contain; pointer-events: none;
        }

        /* PINES */
        .pin-master {
            position: absolute; display: none; align-items: center; gap: 10px;
            transform: translate(-22.5px, -45px); z-index: 10; pointer-events: none;
        }
        .pin-master.izquierda { flex-direction: row-reverse; transform: translate(-100%, -45px) translateX(22.5px); }
        .pin-svg { width: 45px; height: 45px; fill: #D83939; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.8)); flex-shrink: 0; }
        .contenedor-texto { display: flex; align-items: center; filter: drop-shadow(0 4px 10px rgba(0,0,0,1)); }
        .etiqueta-nombre { color: #fff; font-size: 23px; white-space: nowrap; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-weight: 700; text-transform: uppercase; }
        .flag-pin { width: 35px; height: auto; border-radius: 3px; }

        .overlay-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; z-index: 4; pointer-events: none; }

        /* PANEL */
        .panel { width: 1040px; background: #000; padding: 20px; border-left: 2px solid #333; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .row-ctrl { display: flex; align-items: center; gap: 8px; background: #111; padding: 10px; border-radius: 6px; margin-bottom: 5px; border: 2px solid transparent; }
        .row-ctrl.selected-row { border-color: transparent; background: #1a1a1a; }
        .row-ctrl img.flag-ui { width: 50px; height: 35px; object-fit: cover; border-radius: 3px; }
        .row-ctrl span { flex: 1; font-size: 18px; text-transform: uppercase; font-weight: 700; color: #eee; }
        
        input[type="text"], input[type="number"], textarea { padding: 8px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; }
        .btn-pin { padding: 5px 15px; cursor: pointer; background: #333; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; }
        .btn-pin.active { background: #e74c3c; }
        .btn-descargar { background: #2ecc71; color: black; border: none; padding: 15px; font-weight: 900; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        
        #canvas-render { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; display: none; }
    </style>
</head>
<body>

<div id="post-wrapper">
    <div id="post-container" onclick="colocarPin(event)">
        <canvas id="canvas-render"></canvas>
        <div id="info-fuente"></div>
        <div id="contenedor-titulos" style="margin-left:-1135px;margin-top:200px">
            <div id="mapa-titulo"></div>
            <div id="mapa-bajada"></div>
        </div>
        
        <div id="mapas-container"></div>
        <div id="imagenes-layer"></div> 
        <div id="pines-layer"></div> 
        <img class="overlay-img" src="https://i.imgur.com/Kx0f6Qs.png" crossorigin="anonymous">
        <img class="overlay-img" src="https://i.imgur.com/6uM66BE.png" crossorigin="anonymous">
        <img class="overlay-img" src="https://i.imgur.com/6hVhhBJ.png" crossorigin="anonymous">
    </div>
</div>

<div class="panel">
    <div style="background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 10px;">
        <h2 style="color: #2ecc71; margin: 0 0 10px 0; font-size: 18px;">CONFIGURACIÓN AMÉRICA</h2>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <textarea id="inp-titulo" placeholder="TÍTULO..." oninput="actualizarTextos()"></textarea>
            <input type="text" id="inp-bajada" placeholder="Descripción..." oninput="actualizarTextos()">
            <input type="text" id="inp-fuente" placeholder="Fuente..." oninput="actualizarTextos()">
        </div>
        <p style="font-size: 12px; color: #888; margin-top: 10px;"><b>L / R</b>: Pin | <b>Imagen URL</b>: Poner foto en país | <b>Flechas</b>: Mover fotos</p>
    </div>

    <div id="lista-paises"></div>
    <button class="btn-descargar" onclick="descargar()">DESCARGAR IMAGEN</button>
</div>

<script>
    let modoActivo = null;
    let ladoActivo = 'derecha';
    let currentIdx = 0;
    const tamañosImg = { "1": "40px", "2": "65px", "3": "90px", "4": "120px", "5": "160px" };

    const paises = [
        { id: 'can', nombre: 'Canadá', flag: 'https://i.imgur.com/UHZO581.png', x: 36, y: 31, mask: 'https://i.imgur.com/aj790u9.png' },
        { id: 'usa', nombre: 'USA', flag: 'https://i.imgur.com/fyOSBmS.png', x: 37.5, y: 44.5, mask: 'https://i.imgur.com/l316TCU.png' },
        { id: 'mex', nombre: 'México', flag: 'https://i.imgur.com/q8kecW3.png', x: 35.3, y: 53.2, mask: 'https://i.imgur.com/SkoYilk.png' },
        { id: 'gua', nombre: 'Guatemala', flag: 'https://i.imgur.com/6puy1Vw.png', x: 71.48, y: 50.3, mask: 'https://i.imgur.com/t1tvD5M.png' },
        { id: 'sal', nombre: 'El Salvador', flag: 'https://i.imgur.com/lxJQXkS.png', x: 73.3, y: 53.3, mask: 'https://i.imgur.com/s8Zn6d8.png' },
        { id: 'hon', nombre: 'Honduras', flag: 'https://i.imgur.com/Hqu7orV.png', x: 77.2, y: 51.3, mask: 'https://i.imgur.com/zm2dUH3.png' },
        { id: 'nic', nombre: 'Nicaragua', flag: 'https://i.imgur.com/uQZlcEp.png', x: 80, y: 53.8, mask: 'https://i.imgur.com/SSvZunG.png' },
        { id: 'cri', nombre: 'Costa Rica', flag: 'https://i.imgur.com/oybBezD.png', x: 80.2, y: 57.1, mask: 'https://i.imgur.com/o7ZAW32.png' },
        { id: 'pan', nombre: 'Panamá', flag: 'https://i.imgur.com/udy3Y11.png', x: 86.3, y: 58.5, mask: 'https://i.imgur.com/dEmovX6.png' },
        { id: 'col', nombre: 'Colombia', flag: 'https://i.imgur.com/IaDjys8.png', x: 52.3, y: 61.3, mask: 'https://i.imgur.com/67E9nSH.png' },
        { id: 'ven', nombre: 'Venezuela', flag: 'https://i.imgur.com/6OPNUYa.png', x: 56.7, y: 59.9, mask: 'https://i.imgur.com/6mhq3dU.png' },
        { id: 'ecu', nombre: 'Ecuador', flag: 'https://i.imgur.com/qwhGIkw.png', x: 49.2, y: 63.5, mask: 'https://i.imgur.com/qxRVtEN.png' },
        { id: 'per', nombre: 'Perú', flag: 'https://i.imgur.com/e9DRUDe.png', x: 51.3, y: 67.4, mask: 'https://i.imgur.com/gCSDu0E.png' },
        { id: 'bol', nombre: 'Bolivia', flag: 'https://i.imgur.com/yvPaQiX.png', x: 57.8, y: 70, mask: 'https://i.imgur.com/caZgllA.png' },
        { id: 'bra', nombre: 'Brasil', flag: 'https://i.imgur.com/vydhaEG.png', x: 66.7, y: 68, mask: 'https://i.imgur.com/gVY836E.png' },
        { id: 'par', nombre: 'Paraguay', flag: 'https://i.imgur.com/dN86dOm.png', x: 61.8, y: 72.8, mask: 'https://i.imgur.com/B6yC9ri.png' },
        { id: 'chi', nombre: 'Chile', flag: 'https://i.imgur.com/LQ7gEbn.png', x: 53.5, y: 81, mask: 'https://i.imgur.com/4PZF535.png' },
        { id: 'arg', nombre: 'Argentina', flag: 'https://i.imgur.com/zHLkbr0.png', x: 59.2, y: 77.5, mask: 'https://i.imgur.com/4OnPi98.png' },
        { id: 'uru', nombre: 'Uruguay', flag: 'https://i.imgur.com/2VJed6D.png', x: 64.05, y: 77.1, mask: 'https://i.imgur.com/elVtgAk.png' }
    ];

    function init() {
        const lista = document.getElementById('lista-paises');
        const mapasCont = document.getElementById('mapas-container');
        const imgCont = document.getElementById('imagenes-layer');
        const pinesCont = document.getElementById('pines-layer');

        paises.forEach((p, idx) => {
            // Capa Mapa
            const m = document.createElement('div'); 
            m.id = `mapa-${p.id}`; m.className = 'mapa'; 
            m.style.webkitMask = `url('${p.mask}')`; m.style.mask = `url('${p.mask}')`;
            mapasCont.appendChild(m);
            
            // Capa Imagen Imagen
            const img = document.createElement('img'); 
            img.id = `img-map-${p.id}`; img.className = 'img-mapa'; 
            img.style.left = p.x + "%"; img.style.top = p.y + "%"; 
            img.crossOrigin = "anonymous";
            imgCont.appendChild(img);

            // Capa Pin
            const pin = document.createElement('div');
            pin.id = `pin-${p.id}`; pin.className = 'pin-master';
            pin.innerHTML = `
                <svg class="pin-svg" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                <div class="contenedor-texto">
                    <img src="${p.flag}" class="flag-pin" id="flag-img-${p.id}" crossorigin="anonymous">
                    <div class="etiqueta-nombre" id="lbl-${p.id}">${p.nombre}</div>
                </div>`;
            pinesCont.appendChild(pin);

            // Control Panel
            const div = document.createElement('div'); 
            div.className = 'row-ctrl'; div.id = `row-${idx}`;
            div.onclick = () => selectCountry(idx);
            div.innerHTML = `
                <img src="${p.flag}" class="flag-ui">
                <span>${p.nombre}</span>
                <input type="color" id="col-${p.id}" value="#AFAFAF" oninput="actualizar()">
                <input type="text" id="url-${p.id}" placeholder="Imagen URL..." oninput="actualizar()">
                <input type="number" id="size-${p.id}" value="3" min="1" max="5" oninput="actualizar()" style="width:40px;">
                <input type="text" id="txt-${p.id}" placeholder="Texto pin..." oninput="actualizar()" style="width:90px">
                <button class="btn-pin" id="btn-L-${p.id}" onclick="setModo('${p.id}', 'izquierda')">L</button>
                <button class="btn-pin" id="btn-R-${p.id}" onclick="setModo('${p.id}', 'derecha')">R</button>
            `;
            lista.appendChild(div);
        });
        selectCountry(0);
    }

    function selectCountry(idx) {
        currentIdx = idx;
        document.querySelectorAll('.row-ctrl').forEach(r => r.classList.remove('selected-row'));
        document.getElementById(`row-${idx}`).classList.add('selected-row');
    }

    function setModo(id, lado) {
        modoActivo = id; ladoActivo = lado;
        document.querySelectorAll('.btn-pin').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lado === 'izquierda' ? 'L' : 'R'}-${id}`).classList.add('active');
    }

    function colocarPin(e) {
        if (!modoActivo) return;
        const container = document.getElementById('post-container');
        const rect = container.getBoundingClientRect();
        const pin = document.getElementById(`pin-${modoActivo}`);
        pin.style.left = (((e.clientX - rect.left) / rect.width) * 100) + "%";
        pin.style.top = (((e.clientY - rect.top) / rect.height) * 100) + "%";
        pin.style.display = "flex";
        pin.className = `pin-master ${ladoActivo}`;
        const flagImg = document.getElementById(`flag-img-${modoActivo}`);
        flagImg.style.margin = (ladoActivo === 'derecha') ? "0 8px 0 0" : "0 0 0 8px";
        modoActivo = null;
        document.querySelectorAll('.btn-pin').forEach(b => b.classList.remove('active'));
    }

    window.addEventListener('keydown', (e) => {
        const p = paises[currentIdx];
        const step = e.shiftKey ? 1 : 0.1;
        if (e.key === 'ArrowUp') p.y -= step;
        if (e.key === 'ArrowDown') p.y += step;
        if (e.key === 'ArrowLeft') p.x -= step;
        if (e.key === 'ArrowRight') p.x += step;
        actualizar();
    });

    function actualizarTextos() {
        document.getElementById('mapa-titulo').innerText = document.getElementById('inp-titulo').value;
        document.getElementById('mapa-bajada').innerText = document.getElementById('inp-bajada').value;
        document.getElementById('info-fuente').innerText = document.getElementById('inp-fuente').value;
    }

    function actualizar() {
        paises.forEach(p => {
            const colorIn = document.getElementById(`col-${p.id}`).value;
            const urlIn = document.getElementById(`url-${p.id}`).value;
            const sizeIn = document.getElementById(`size-${p.id}`).value;
            const txtIn = document.getElementById(`txt-${p.id}`).value;
            
            document.getElementById(`mapa-${p.id}`).style.backgroundColor = colorIn;
            document.getElementById(`lbl-${p.id}`).innerText = txtIn !== "" ? txtIn : p.nombre.toUpperCase();
            
            const imgMap = document.getElementById(`img-map-${p.id}`);
            imgMap.style.left = p.x + "%"; imgMap.style.top = p.y + "%";
            if (urlIn.trim() !== "") {
                if(imgMap.src !== urlIn) imgMap.src = urlIn;
                imgMap.style.width = tamañosImg[sizeIn] || "65px";
                imgMap.style.display = "block";
            } else {
                imgMap.style.display = "none";
            }
        });
    }

    async function descargar(){
        const container = document.getElementById("post-container");
        const canvasR = document.getElementById("canvas-render");
        const ctx = canvasR.getContext("2d");
        canvasR.width = 1080; canvasR.height = 1350;
        canvasR.style.display = "block";
        ctx.clearRect(0, 0, 1080, 1350);

        const promesas = paises.map(p => {
            return new Promise((res) => {
                const img = new Image(); img.crossOrigin = "anonymous"; 
                img.src = p.mask;
                img.onload = () => {
                    const color = document.getElementById(`col-${p.id}`).value;
                    const tCanvas = document.createElement('canvas'); tCanvas.width = 1080; tCanvas.height = 1350;
                    const tCtx = tCanvas.getContext('2d');
                    tCtx.drawImage(img, 0, 0, 1080, 1350);
                    tCtx.globalCompositeOperation = 'source-in';
                    tCtx.fillStyle = color; tCtx.fillRect(0, 0, 1080, 1350);
                    ctx.drawImage(tCanvas, 0, 0); res();
                };
                img.onerror = res;
            });
        });

        await Promise.all(promesas);
        document.getElementById("mapas-container").style.opacity = "0";

        html2canvas(container, { useCORS: true, scale: 1 }).then(canvas => {
            const link = document.createElement("a");
            link.download = `Mapa_America_Zombies_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png"); link.click();
            canvasR.style.display = "none"; 
            document.getElementById("mapas-container").style.opacity = "1";
        });
    }

    init();
</script>

</body>
</html>
